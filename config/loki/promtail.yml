server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect all Docker container logs with basic labels
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

  # Dedicated pipeline for APISIX WAF — parses Coraza Access denied lines into structured labels
  - job_name: apisix-waf
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["apisix"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: /apisix
        action: keep
    pipeline_stages:
      # Only keep Coraza Access denied lines
      - match:
          selector: '{container="/apisix"}'
          action: keep
          stages:
            - regex:
                expression: '.*Coraza: Access denied.*client: (?P<client_ip>[\d.]+).*request: "(?P<method>[A-Z]+) (?P<request_uri>[^ ]+)'
            - regex:
                expression: '.*\[id "(?P<rule_id>\d+)"\]'
            - regex:
                expression: '.*\[severity "(?P<severity>[^"]+)"\]'
            - labels:
                client_ip:
                method:
                request_uri:
                rule_id:
                severity:
            - static_labels:
                job: apisix-waf
                waf_action: deny
